<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404 | Página Não Encontrada</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="NotFound.css">

</head>

<body>

  <div class="background-grid"></div>

  <main class="notfound-container">

    <div class="status-badge">
      <i class="bi bi-exclamation-triangle-fill"></i>
      Error 404
    </div>

    <div class="error-code">
      404
    </div>

    <h1>Página não encontrada</h1>

    <p class="description">
      Ops... a página que você tentou acessar não existe,
      foi removida ou está temporariamente indisponível.
    </p>

    <img
      src="img/error.png"
      alt="Imagem de erro"
      class="error-image hover-image">

    <div class="actions">

      <a href="dashboard.html" class="btn btn-primary">
        <i class="bi bi-house-door-fill"></i>
        Voltar ao Dashboard
      </a>

      <a href="index.html" class="btn btn-secondary">
        <i class="bi bi-arrow-left-circle-fill"></i>
        Página Inicial
      </a>

    </div>

    <div class="quick-links">

      <h3>Links rápidos</h3>

      <div class="links-grid">

        <a href="Incidents.html">
          <i class="bi bi-shield-fill-exclamation"></i>
          Incidentes
        </a>

        <a href="CreateIncident.html">
          <i class="bi bi-plus-circle-fill"></i>
          Novo Incidente
        </a>

        <a href="login.html">
          <i class="bi bi-box-arrow-in-right"></i>
          Login
        </a>

        <a href="dashboard.html">
          <i class="bi bi-speedometer2"></i>
          Dashboard
        </a>

      </div>

    </div>

  </main>

</body>

</html>
