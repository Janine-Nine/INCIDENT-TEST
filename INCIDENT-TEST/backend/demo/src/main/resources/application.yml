server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: incident-management-api

  datasource:
    url: jdbc:postgresql://localhost:5432/incidentdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      indent-output: true

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    com.example.incidentmanager: DEBUG

  file:
    name: logs/incident-management.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

jwt:
  secret: mySecretKeyJwtTokenSpringBoot2026
  expiration: 3600000
  refresh-expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

  api-docs:
    path: /v3/api-docs