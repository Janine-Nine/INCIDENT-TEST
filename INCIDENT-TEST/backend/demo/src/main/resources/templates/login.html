<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h2>🔐 Login</h2>

        <form>

            <label>Usuário</label>

            <input type="text"
                   placeholder="Digite seu usuário">

            <br><br>

            <label>Senha</label>

            <input type="password"
                   placeholder="Digite sua senha">

            <br><br>

            <button class="btn btn-primary">
                Entrar
            </button>

        </form>

    </div>

</div>

</body>

</html>
