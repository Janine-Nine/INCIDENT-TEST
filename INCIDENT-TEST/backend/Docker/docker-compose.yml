version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: incident-postgres

    environment:
      POSTGRES_DB: incidentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - incident-network

  backend:
    build: .

    container_name: incident-api

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incidentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    networks:
      - incident-network

volumes:
  postgres_data:

networks:
  incident-network: